name: 💡 功能请求
description: 请求一个新功能或功能增强
title: "[Request]: "
labels: ["module"]
assignees: [abgox]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: 开始之前...
      options:
        - label: 你已经阅读了项目的 README 文件。
          required: true
        - label: 你已经在 [Issues](https://github.com/abgox/PSCompletions/issues) 中搜索了相关问题。
          required: true
        - label: 如果功能请求和补全菜单相关，请先检查 `psc menu config` 下的相关配置。
          required: true
        - label: 你已经查看了 https://pscompletions.abgox.com/docs/
  - type: textarea
    id: description
    attributes:
      label: 描述这个功能请求
      description: |
        - 目前 PSCompletions 存在哪些不足？
        - 详细描述你需要的功能需求或想法。
        - 你认为有哪些可行的实现方案作为参考？
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 当前使用的 PSCompletions 版本
      description: 运行 `psc` 查看当前版本
      placeholder: v6.6.0
    validations:
      required: true
  - type: textarea
    attributes:
      label: Powershell 版本
      render: console
      placeholder: |
        PS> $PSVersionTable

        Name                           Value
        ----                           -----
        PSVersion                      7.5.0
        PSEdition                      Core
        GitCommitId                    7.5.0
        OS                             Microsoft Windows 10.0.26100
        Platform                       Win32NT
        PSCompatibleVersions           {1.0, 2.0, 3.0, 4.0…}
        PSRemotingProtocolVersion      2.3
        SerializationVersion           1.1.0.1
        WSManStackVersion              3.0
    validations:
      required: true
  - type: textarea
    id: additional-info
    attributes:
      label: 还有其他你想要补充的信息吗？
